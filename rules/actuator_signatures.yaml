# Actuator failure signatures for the test-station diagnostics dashboard.
# This rule set is illustrative. It models common actuator failure modes
# seen on a hardware debugging bench, not any specific instrument protocol.
#
# Each rule has a kind that selects the detector:
#   timeout      - a trigger event with no resolve event inside window
#   threshold    - a numeric field crossing a bound
#   consecutive  - N trigger events in a row with no resolve event between
rules:
  - id: actuator_timeout
    kind: timeout
    description: move_command issued with no position_reached within the window
    subsystem: actuator
    trigger_pattern: move_command
    resolve_pattern: position_reached
    within: 2s
    severity: error

  - id: actuator_overcurrent
    kind: threshold
    description: actuator drive current exceeds the safe operating bound
    subsystem: actuator
    level: warn
    field: current_a
    operator: gt
    threshold: 3.5
    severity: error

  - id: actuator_stuck
    kind: consecutive
    description: three move_command events with no position_reached between them
    subsystem: actuator
    trigger_pattern: move_command
    resolve_pattern: position_reached
    count: 3
    severity: error

  - id: actuator_undercurrent
    kind: threshold
    description: actuator drive current below the stall-detection floor
    subsystem: actuator
    level: warn
    field: current_a
    operator: lt
    threshold: 0.2
    severity: warn

  - id: actuator_overtemp
    kind: threshold
    description: actuator winding temperature exceeds the thermal limit
    subsystem: actuator
    level: warn
    field: temp_c
    operator: gt
    threshold: 85.0
    severity: error

  - id: encoder_dropout
    kind: timeout
    description: encoder_lost with no encoder_locked recovery inside the window
    subsystem: actuator
    trigger_pattern: encoder_lost
    resolve_pattern: encoder_locked
    within: 1s
    severity: error

  - id: home_retry_storm
    kind: consecutive
    description: four homing_failed events with no homing_ok between them
    subsystem: actuator
    trigger_pattern: homing_failed
    resolve_pattern: homing_ok
    count: 4
    severity: warn

  - id: power_supply_sag
    kind: threshold
    description: rail voltage drops below the brownout threshold
    subsystem: power
    level: warn
    field: rail_v
    operator: lt
    threshold: 22.0
    severity: error
